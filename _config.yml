# Site
title: L Blog
subtitle: 'readant的技术分享空间'
description: '物联网工程专业学生的技术博客，记录学习路上的点滴'
author: readant
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://readant.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false
  line_number: false
  auto_detect: false
  tab_replace: ''

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
date_format_i18n: YYYY-MM-DD

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: custom-l-theme

# Deployment
deploy:
  type: git
  repo: https://github.com/readant/readant.github.io.git
  branch: gh-pages
  message: "deploy: site updated at {{ now('YYYY-MM-DD HH:mm:ss') }}"